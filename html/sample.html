<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple JS Counter App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    #counter {
      font-size: 48px;
      margin: 20px 0;
    }
    button {
      font-size: 18px;
      margin: 5px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Simple Counter App</h1>
  <div id="counter">0</div>
  <button onclick="decrement()">-</button>
  <button onclick="reset()">Reset</button>
  <button onclick="increment()">+</button>

  <script>
    let count = 0;

    function updateDisplay() {
      document.getElementById('counter').innerText = count;
    }

    function increment() {
      count++;
      updateDisplay();
    }

    function decrement() {
      count--;
      updateDisplay();
    }

    function reset() {
      count = 0;
      updateDisplay();
    }
  </script>
</body>
</html>
